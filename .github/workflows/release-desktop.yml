name: Release Desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    name: Build Windows Desktop
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: |
          npm run saveData:test:db
          npm run typecheck

      - name: Build Windows installer
        run: npm run desktop:build:win

      - name: Collect release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force builds/release-assets | Out-Null
          Get-ChildItem builds/desktop -File |
            Where-Object { $_.Extension -in ".exe", ".blockmap", ".yml" } |
            Copy-Item -Destination builds/release-assets
          Get-FileHash builds/release-assets/* -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash.ToLowerInvariant())  $([System.IO.Path]::GetFileName($_.Path))" } |
            Set-Content builds/release-assets/checksums.txt

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-desktop
          path: builds/release-assets/*

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" builds/release-assets/* --clobber
          else
            gh release create "$RELEASE_TAG" builds/release-assets/* --title "$RELEASE_TAG" --generate-notes
          fi
