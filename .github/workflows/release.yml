name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.2.5"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: |
          npm run typecheck
          npm run saveData:test:db
          node --check tools\launch-native-flash-mock.cjs
          node --check tools\package-native-flash.cjs
          node --check runtime\save-data\public\native-player.js
          node --check runtime\save-data\public\mock-platform.js

      - name: Build native Flash desktop package
        run: |
          npm run native-flash:build-host
          npm run native-flash:package

      - name: Resolve release tag
        id: release_tag
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            "tag=${{ inputs.tag }}" >> $env:GITHUB_OUTPUT
          } else {
            "tag=${{ github.ref_name }}" >> $env:GITHUB_OUTPUT
          }

      - name: Create or update GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
        shell: bash
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists."
          else
            gh release create "$RELEASE_TAG" --title "$RELEASE_TAG" --generate-notes
          fi
          if compgen -G "builds/release-assets/*" > /dev/null; then
            gh release upload "$RELEASE_TAG" builds/release-assets/* --clobber
          fi
