name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.2.5"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: |
          npm run typecheck
          npm run saveData:test:db
          node --check tools\launch-native-flash-mock.cjs
          node --check tools\package-native-flash.cjs
          node --check tools\patch-runtime-mock-bag.cjs
          node --check tools\patch-pay-event-listener.cjs
          node --check tools\inspect-abc-references.cjs
          node --check runtime\save-data\public\native-player.js
          node --check runtime\save-data\public\mock-platform.js
          node --check runtime\save-data\public\runner.js

      - name: Restore Pepper Flash from secret
        env:
          PEPPER_FLASH_BASE64: ${{ secrets.PEPPER_FLASH_BASE64 }}
        shell: pwsh
        run: |
          if (-not $env:PEPPER_FLASH_BASE64) {
            "PEPPER_FLASH_BASE64 is not configured; native desktop package will be skipped."
            exit 0
          }
          New-Item -ItemType Directory -Force workspace/native-cef | Out-Null
          [IO.File]::WriteAllBytes(
            "workspace/native-cef/pepflashplayer64.dll",
            [Convert]::FromBase64String($env:PEPPER_FLASH_BASE64)
          )

      - name: Build native Flash desktop package
        shell: pwsh
        run: |
          if (-not (Test-Path "workspace/native-cef/pepflashplayer64.dll")) {
            "Pepper Flash is unavailable; skipping native desktop package."
            exit 0
          }
          npm run native-flash:package

      - name: Resolve release tag
        id: release_tag
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            "tag=${{ inputs.tag }}" >> $env:GITHUB_OUTPUT
          } else {
            "tag=${{ github.ref_name }}" >> $env:GITHUB_OUTPUT
          }

      - name: Create or update GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
        shell: bash
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists."
          else
            gh release create "$RELEASE_TAG" --title "$RELEASE_TAG" --generate-notes
          fi
          if compgen -G "builds/release-assets/*" > /dev/null; then
            gh release upload "$RELEASE_TAG" builds/release-assets/* --clobber
          fi
