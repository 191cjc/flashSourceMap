<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>saveData 本地 Mock</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="layout">
      <aside class="side">
        <h1>saveData Mock</h1>
        <div class="status">
          <span>运行状态</span>
          <strong id="status">启动中</strong>
        </div>
        <div class="actions">
          <button id="reloadGame" type="button">重载</button>
        </div>
        <nav class="side-tabs" aria-label="本地工具">
          <button class="is-active" data-tab-button="wallet" type="button">钱包</button>
          <button data-tab-button="items" type="button">物品</button>
          <button data-tab-button="rewards" type="button">奖励</button>
        </nav>
        <section class="panel tab-panel is-active" data-tab-panel="wallet" aria-label="本地钱包">
          <h2>本地钱包</h2>
          <dl class="wallet">
            <dt>余额</dt>
            <dd id="walletBalance">读取中</dd>
            <dt>累计充值</dt>
            <dd id="walletTotalRecharged">读取中</dd>
            <dt>累计消费</dt>
            <dd id="walletTotalPaid">读取中</dd>
          </dl>
          <label class="field">
            <span>金额</span>
            <input id="rechargeAmount" type="number" inputmode="numeric" min="1" step="1" value="1000" />
          </label>
          <button id="localRecharge" type="button">点击充值</button>
          <p id="rechargeHint" class="hint">请先充值，再进入存档；进入游戏后充值暂不可用。</p>
        </section>
        <section class="panel tab-panel" data-tab-panel="items" aria-label="物品工具">
          <h2>物品添加</h2>
          <label class="field">
            <span>搜索</span>
            <input id="itemSearch" type="search" placeholder="名称、ID、类型或背包" />
          </label>
          <div class="item-filters">
            <label class="field">
              <span>背包</span>
              <select id="itemBagFilter"></select>
            </label>
            <label class="field">
              <span>类型</span>
              <select id="itemTypeFilter"></select>
            </label>
          </div>
          <div id="itemResults" class="item-results" aria-live="polite"></div>
          <div class="item-pick">
            <label class="field">
              <span>物品 ID</span>
              <input id="itemId" type="number" inputmode="numeric" min="1" step="1" />
            </label>
            <label class="field">
              <span>数量</span>
              <input id="itemCount" type="number" inputmode="numeric" min="1" max="999" step="1" value="1" />
            </label>
          </div>
          <div class="button-row">
            <button id="addItemToQueue" type="button">加入队列</button>
            <button id="sendItemsToGame" type="button">发送</button>
          </div>
          <button id="clearItemQueue" type="button">清空队列</button>
          <div id="itemQueue" class="item-queue"></div>
          <p id="itemHint" class="hint">进入存档后，将队列里的物品发送到游戏。</p>
        </section>
        <section class="panel tab-panel" data-tab-panel="rewards" aria-label="关卡通关奖励">
          <h2>通关奖励</h2>
          <p id="levelRewardHint" class="hint">通关成就奖励已固定启用为 9999，重载游戏后生效。</p>
        </section>
        <dl>
          <dt>账号</dt>
          <dd id="account">读取中</dd>
          <dt>资源</dt>
          <dd id="resource">xfbbv451.swf</dd>
        </dl>
        <ol id="log" class="log"></ol>
      </aside>
      <section class="stage">
        <div id="player"></div>
      </section>
    </main>
    <script src="/mock-platform.js"></script>
    <script src="/ruffle/ruffle.js"></script>
    <script src="/runner.js"></script>
  </body>
</html>
