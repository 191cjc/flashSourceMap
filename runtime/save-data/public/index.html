<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>saveData 本地 Mock</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="layout">
      <aside class="side">
        <h1>saveData Mock</h1>
        <div class="status">
          <span>运行状态</span>
          <strong id="status">启动中</strong>
        </div>
        <div class="actions">
          <button id="reloadGame" type="button">重载</button>
        </div>
        <section class="panel" aria-label="本地钱包">
          <h2>本地钱包</h2>
          <dl class="wallet">
            <dt>余额</dt>
            <dd id="walletBalance">读取中</dd>
            <dt>累计充值</dt>
            <dd id="walletTotalRecharged">读取中</dd>
            <dt>累计消费</dt>
            <dd id="walletTotalPaid">读取中</dd>
          </dl>
          <label class="field">
            <span>金额</span>
            <input id="rechargeAmount" type="number" inputmode="numeric" min="1" step="1" value="1000" />
          </label>
          <button id="localRecharge" type="button">点击充值</button>
          <p id="rechargeHint" class="hint">请先充值，再进入存档；进入游戏后充值暂不可用。</p>
        </section>
        <section class="panel" aria-label="关卡通关奖励">
          <h2>通关奖励</h2>
          <label class="field">
            <span>关卡</span>
            <select id="levelRewardSelect">
              <option value="">读取中</option>
            </select>
          </label>
          <div class="reward-fields">
            <label class="field">
              <span>经验</span>
              <input id="levelRewardExp" type="number" inputmode="numeric" min="0" step="1" />
            </label>
            <label class="field">
              <span>金币</span>
              <input id="levelRewardGold" type="number" inputmode="numeric" min="0" step="1" />
            </label>
            <label class="field">
              <span>成就</span>
              <input id="levelRewardAchievement" type="number" inputmode="numeric" min="0" step="1" />
            </label>
          </div>
          <div class="button-row">
            <button id="applyLevelReward" type="button">应用</button>
            <button id="resetLevelReward" type="button">还原</button>
          </div>
          <p id="levelRewardHint" class="hint">修改后重载游戏生效，已进入的关卡不会即时刷新。</p>
        </section>
        <dl>
          <dt>账号</dt>
          <dd id="account">读取中</dd>
          <dt>资源</dt>
          <dd id="resource">xfbbv451.swf</dd>
        </dl>
        <ol id="log" class="log"></ol>
      </aside>
      <section class="stage">
        <div id="player"></div>
      </section>
    </main>
    <script src="/mock-platform.js"></script>
    <script src="/ruffle/ruffle.js"></script>
    <script src="/runner.js"></script>
  </body>
</html>
