<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Flash Global Staff</title>
  <link rel="stylesheet" href="/staff/styles.css">
</head>
<body>
  <div class="page-shell">
    <header class="hero">
      <div>
        <p class="eyebrow">FLASH GLOBAL DATA · STAFF</p>
        <h1>联机数据控制台</h1>
        <p class="hero-copy">查看已接入联机模式的玩家、远端存档、军团与排行榜状态。</p>
      </div>
      <div class="hero-actions">
        <span id="serviceState" class="status-pill is-loading"><span></span>正在连接</span>
        <button id="refreshButton" class="primary-button" type="button">立即刷新</button>
      </div>
    </header>

    <main>
      <section id="summaryCards" class="summary-grid" aria-label="数据概况"></section>

      <section class="workspace">
        <div class="toolbar">
          <nav class="tabs" aria-label="Staff 数据分类">
            <button class="tab is-active" type="button" data-view="players">玩家</button>
            <button class="tab" type="button" data-view="unions">军团</button>
            <button class="tab" type="button" data-view="ranks">排行榜</button>
          </nav>
          <label class="search-box" id="searchBox">
            <span>搜索</span>
            <input id="playerSearch" type="search" placeholder="UID、用户名、昵称或实例 ID" autocomplete="off">
          </label>
        </div>

        <div id="notice" class="notice" hidden></div>
        <section id="playersView" class="view-panel"></section>
        <section id="unionsView" class="view-panel" hidden></section>
        <section id="ranksView" class="view-panel" hidden></section>
      </section>
    </main>

    <footer>
      <span id="lastUpdated">尚未获取数据</span>
      <span>每 15 秒自动刷新</span>
    </footer>
  </div>
  <script src="/staff/app.js" defer></script>
</body>
</html>
